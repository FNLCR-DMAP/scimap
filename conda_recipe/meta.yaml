package:
  name: scimap
  version: "2.1.3_dmap"  # Update as appropriate

source:
  path: ../  # Adjust this to point to your local repo's directory if this is not the root of the repo

channels:
  - conda-forge
  - leej3
  - anaconda

build:
  number: 0
  script: python -m pip install . -vv # Pip install to handle `pyproject.toml`

requirements:
  build:
    - python ==3.9.13
    - pip
    - setuptools
    - poetry

  run:
    - python ==3.9.13
    - pytest
    - anndata
    - pandas
    - scipy
    - seaborn
    - tifffile
    - numpy
    - pytest-xvfb
    - matplotlib
    - phenograph
    - scanpy
    - mkdocs
    - plotly
    - tifffile
    - dask[array]
    - zarr
    - napari
    - numba
    - shapely
    - gensim
    - mkdocs-material
    - napari-ome-zarr
    - llvmlite
    - mpl-scatter-density
    - scikit-learn

test:
  imports:
    - scimap

about:
  home: https://github.com/labsyspharm/scimap
  license: MIT  # Update as needed
  summary: "Spatially resolved single-cell analysis in Python."

extra:
  recipe-maintainers:
    - georgezakinih
    - ruiheesi
    - fangliu117
  